<div class="card bg-base-100 shadow-xl border border-base-300 rounded-2xl overflow-hidden" v-if="display_ledger_state">
  <div class="card-body p-5">
    <h2 class="card-title text-base m-0">
      <span class="fa fa-sitemap text-primary opacity-90"></span>
      Ledger state
    </h2>
    <div class="alert alert-info py-2 text-sm mt-2" v-if="syncing">
      <span class="fa fa-info-circle"></span>
      <span>Fetching transactions</span>
    </div>
    <p class="text-xs text-base-content/60 mt-1">View transactions for all 3 ledgers:</p>
    <div class="flex flex-col gap-1.5 mt-3">
      {% if INDY_SCAN_URL %}
      <a href="{{ INDY_SCAN_URL }}" class="btn btn-ghost btn-sm justify-start gap-2 rounded-lg" target="_blank" rel="noopener">
        <span class="fa fa-chevron-right"></span> {{ INDY_SCAN_TEXT }} <i class="fa fa-external-link opacity-70"></i>
      </a>
      {% else %}
      <a href="/browse/domain" class="btn btn-ghost btn-sm justify-start gap-2 rounded-lg ledger-state-link">
        <span class="fa fa-chevron-right"></span> Domain
      </a>
      <a href="/browse/pool" class="btn btn-ghost btn-sm justify-start gap-2 rounded-lg ledger-state-link">
        <span class="fa fa-chevron-right"></span> Pool
      </a>
      <a href="/browse/config" class="btn btn-ghost btn-sm justify-start gap-2 rounded-lg ledger-state-link">
        <span class="fa fa-chevron-right"></span> Config
      </a>
      {% endif %}
    </div>
  </div>
</div>
